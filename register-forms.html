<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alumni Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login-forms.css">
</head>
<body>
    <div class="top-header">
        <div class="header-left">
            <img id="upse-logo" src="assets/upse-logo.png" alt="UPSE logo">
        </div>
        <h1 class="system-title">Alumni Management System</h1>
    </div>

    <div class="login-wrapper">
        <div class="login-left">
            <div class="login-box">
                <h2>Register</h2>
                <form id="register-form">
                    <input id="register-email" type="text" placeholder="Email">
                    <input id="register-password" type="password" placeholder="Password">
                    <input id="register-confirm" type="password" placeholder="Confirm Password">
                    <p id="register-error" style="color: red; display: none;"></p>
                    <p id="register-success" style="color: green; display: none;"></p>
                    <button type="submit">Register</button>
                </form>
                <p class="register-text">
                    Already have an account?
                    <a href="login-forms.html">Log-in</a> instead.
                </p>
            </div>
        </div>
        <div class="login-right"></div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById("register-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email     = document.getElementById("register-email").value.trim();
            const password  = document.getElementById("register-password").value;
            const confirm   = document.getElementById("register-confirm").value;
            const errorEl   = document.getElementById("register-error");
            const successEl = document.getElementById("register-success");

            errorEl.style.display   = "none";
            successEl.style.display = "none";

            if (!email || !password || !confirm) {
                errorEl.textContent = "All fields are required.";
                errorEl.style.display = "block";
                return;
            }
            if (password !== confirm) {
                errorEl.textContent = "Passwords do not match.";
                errorEl.style.display = "block";
                return;
            }
            if (password.length < 6) {
                errorEl.textContent = "Password must be at least 6 characters.";
                errorEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch("http://localhost:3001/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    errorEl.textContent = data.error || "Registration failed.";
                    errorEl.style.display = "block";
                    return;
                }

                successEl.textContent = "Account created! Redirecting to login...";
                successEl.style.display = "block";
                setTimeout(() => {
                    window.location.href = "/login-forms.html";
                }, 1500);

            } catch (err) {
                errorEl.textContent = "Could not reach the server. Please try again.";
                errorEl.style.display = "block";
            }
        });
    </script>
</body>
</html>
