<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | UPSE</title>
    <link rel="stylesheet" href="landing-page.css"> <link rel="stylesheet" href="add-records.css">   <link rel="stylesheet" href="profile.css">       <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="navbar">
        <div class="logo">|UPSE Logo Here|</div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="landing-page.html">Home</a>
                <a href="#">Newsletter</a>
                <a href="profile.html" class="active">Profile</a>
                <a href="#" onclick="logout()">Login</a>
            </div>
        </div>
    </div>

    <main class="profile-container">
        <div class="form-section">
            <div class="profile-header">
                <h2>My Alumni Profile</h2>
                <div class="profile-actions">
                    <button id="save-btn" class="add-btn" style="display: none;" onclick="saveData()">Save Changes</button>
                    <button id="edit-cancel-btn" class="edit-btn" onclick="toggleEdit()">Edit Your Data</button>
                </div>
            </div>

            <form id="profile-form">
                <div class="form-grid">
                    <div class="data-group">
                        <label>First Name</label>
                        <div class="data-field" data-key="fname"></div>
                    </div>
                    <div class="data-group">
                        <label>Last Name</label>
                        <div class="data-field" data-key="lname"></div>
                    </div>
                    <div class="data-group">
                        <label>Middle Initial</label>
                        <div class="data-field" data-key="mi"></div>
                    </div>
                    <div class="data-group">
                        <label>Suffix (If Any)</label>
                        <div class="data-field" data-key="suffix"></div>
                    </div>
                    <div class="data-group">
                        <label>Maiden Name</label>
                        <div class="data-field" data-key="maiden"></div>
                    </div>
                    <div class="data-group">
                        <label>Sex Assigned at Birth</label>
                        <div class="data-field" data-key="sex"></div>
                    </div>
                    <div class="data-group">
                        <label>Email Address (Primary)</label>
                        <div class="data-field" data-key="email"></div>
                    </div>
                    <div class="data-group">
                        <label>Mobile Number (Primary)</label>
                        <div class="data-field" data-key="mobile"></div>
                    </div>
                    <div class="data-group">
                        <label>Home Address (Primary)</label>
                        <div class="data-field" data-key="address"></div>
                    </div>
                    <div class="data-group">
                        <label>Student-Number</label>
                        <div class="data-field" data-key="sno"></div>
                    </div>
                    <div class="data-group">
                        <label>Entry Date</label>
                        <div class="data-field" data-key="entry"></div>
                    </div>
                </div>

                <div class="section-title">
                    Active Organizations
                    <button type="button" class="circle-btn add-row-btn" onclick="addOrganization()" style="display: none;">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="organization-container">
                    <div class="organization-row">
                        <div class="data-group">
                            <label>Organization</label>
                            <div class="data-field" data-key="org1"></div>
                        </div>
                        <button type="button" class="circle-btn minus" onclick="removeRow(this)" style="display: none;">
                            <i class="fas fa-minus"></i>
                        </button>
                    </div>
                </div>

                <div class="section-title">
                    Employment History
                    <button type="button" class="circle-btn add-row-btn" onclick="addEmployment()" style="display: none;">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="employment-container">
                    <div class="employment-row">
                        <div class="data-group">
                            <label>Employer</label>
                            <div class="data-field" data-key="emp1"></div>
                        </div>
                        <div class="data-group">
                            <label>Last Position Held</label>
                            <div class="data-field" data-key="pos1"></div>
                        </div>
                        <div class="data-group">
                            <label>Start of Employment</label>
                            <div class="data-field" data-key="start1"></div>
                        </div>
                        <div class="data-group">
                            <label>End of Employment</label>
                            <div class="data-field" data-key="end1"></div>
                        </div>
                        <button type="button" class="circle-btn minus" onclick="removeRow(this)" style="display: none;">
                            <i class="fas fa-minus"></i>
                        </button>
                    </div>
                </div>

                <div class="section-title">
                    Academic History
                    <button type="button" class="circle-btn add-row-btn" onclick="addGraduate()" style="display: none;">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="graduate-container">
                    <div class="graduate-row">
                            <div class="data-group">
                                <label>Degree</label>
                                <div class="data-field" data-key="deg1"></div>
                            </div>
                            <div class="data-group">
                                <label>Latin Honors</label>
                                <div class="data-field" data-key="hon1"></div>
                            </div>
                            <div class="data-group">
                                <label>University Studied</label>
                                <div class="data-field" data-key="univ1"></div>
                            </div>
                            <div class="data-group">
                                <label>Year and Semester Started</label>
                                <div class="data-field" data-key="start_grad1"></div>
                            </div>
                            <div class="data-group">
                                <label>Year and Semester Graduated</label>
                                <div class="data-field" data-key="end_grad1"></div>
                            </div>
                        <button type="button" class="circle-btn minus" onclick="removeRow(this)" style="display: none;">
                            <i class="fas fa-minus"></i>
                        </button>
                    </div>
                    <div class="achievements-row" style="margin-top: 20px;">
                        <div class="data-group">
                            <label>Other Academic Achievements</label>
                            <div class="data-field" data-key="achieve"></div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <div class="footer-top">
        <p>Stuff like UPSE Information to be added here</p>
        <p>Additional UPSE Information</p>
    </div>
    <div class="footer-bottom">
        <p>Footer line here</p>
    </div>

    <script src="profile.js"></script>
</body>
</html>

<script src="auth.js"></script>
<script>
  // Force re-auth check on every load, even when navigating back
    window.onpageshow = function(event) {
    if (event.persisted) {
        // Page was restored from cache — re-check auth
        requireAuth("Alumni"); // or "Alumni" depending on the page
    }
    };
    requireAuth("Alumni");
</script>
