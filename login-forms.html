<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alumni Information Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login-forms.css">
</head>
<body>
    <!-- TOP HEADER -->
    <div class="top-header">
        <div class="header-left">
            <img id="upse-logo" src="assets/upse-logo.png" alt="UPSE logo">
        </div>
        <h1 class="system-title">Alumni Information Management System</h1>
    </div>
    <!-- MAIN CONTENT -->
    <div class="login-wrapper">
        <!-- LEFT SIDE -->
        <div class="login-left">
            <div class="login-box">
                <h2>Log-in</h2>
                <form id="login-form">
                    <input id="login-email" type="text" placeholder="Email">
                    <input id="login-password" type="password" placeholder="Password">
                    <p id="login-error" style="color: red; display: none;"></p>
                    <div class="button-group">
                        <button type="submit">Log-in</button>
                        <button type="button" class="google-btn" onclick="placeholderfuncname()">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                        </button>
                    </div>
                </form>
                <p class="register-text">
                    No account yet?
                    <a href="register-forms.html">Register</a> instead.
                </p>
            </div>
        </div>
        <!-- RIGHT SIDE -->
        <div class="login-right"></div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email    = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;
            const errorEl  = document.getElementById("login-error");

            errorEl.style.display = "none";

            if (!email || !password) {
                errorEl.textContent = "Please enter your email and password.";
                errorEl.style.display = "block";
                return;
            }

            try {
                const response = await fetch("http://localhost:3001/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    errorEl.textContent = data.error || "Login failed.";
                    errorEl.style.display = "block";
                    return;
                }

                saveToken(data.token);
                localStorage.setItem("aims_role", data.role);
                window.location.href = data.redirect;

            } catch (err) {
                errorEl.textContent = "Could not reach the server. Please try again.";
                errorEl.style.display = "block";
            }
        });
    </script>
</body>
</html>
